# This file is a derived, additive scaffold — a mechanical view of canonical
# handovers. Authority flows canonical handover -> phase ledger; the canonical
# handover documents under docs/canonical/ remain the protocol surface.
#
# The canonical handover generator now consumes this file deterministically:
# the next unratified planning row seeds renderer-derived identity and brief
# content for the next handover draft.

