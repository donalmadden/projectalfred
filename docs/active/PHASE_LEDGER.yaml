# Phase Ledger for the blank-project kickoff demo.
#
# This file is a derived, additive scaffold — a mechanical view of canonical
# handovers. Authority flows canonical handover -> phase ledger; the canonical
# handover documents under docs/canonical/ remain the protocol surface.
#
# The canonical handover generator now consumes this file deterministically:
# the next unratified planning row seeds renderer-derived identity and brief
# content for the next handover draft.

project: blank_project_kickoff_demo
plan_path: docs/active/ALFRED_BLANK_PROJECT_KICKOFF_DEMO_PLAN.md

phases:
  - id: 0
    title: Freeze The Scenario
    status: ratified
    handover_id: ALFRED_BLANK_PROJECT_KICKOFF_DEMO_PHASE_0_FROZEN_SCENARIO
    scope_sources:
      - docs/archive/ALFRED_BLANK_PROJECT_KICKOFF_DEMO_PHASE_0_FROZEN_SCENARIO.md

  - id: 1
    title: Define The Canonical Kickoff Handover Shape
    status: ratified
    handover_id: ALFRED_HANDOVER_8
    scope_sources:
      - docs/active/CUSTOMER_ONBOARDING_PORTAL_CHARTER.md
      - docs/active/DEMO_PROJECT_LAYOUT.md
      - docs/active/KICKOFF_HANDOVER_OUTLINE.md

  - id: 2
    title: Close The Execution Path Around The Orchestrator
    status: ratified
    handover_id: ALFRED_HANDOVER_9
    scope_carry_forward: [0, 1]

  - id: 3
    title: Carry Proposed Stories As First-Class Runtime State
    status: ratified
    handover_id: ALFRED_HANDOVER_10
    scope_carry_forward: [0, 1, 2]

  - id: 4
    title: Close The HITL Gate Into GitHub Board Writes
    status: ratified
    handover_id: ALFRED_HANDOVER_11
    scope_carry_forward: [0, 1, 2, 3]

  - id: 5
    title: Rehearsal, Instrumentation, And Demo Script
    status: ratified
    handover_id: ALFRED_HANDOVER_12
    scope_carry_forward: [0, 1, 2, 3, 4]

  - id: 6
    title: "Slice 6 — Renderer Replaces Hand-Edited Identity Constants"
    status: ratified
    handover_id: ALFRED_HANDOVER_18
    scope_sources:
      - docs/active/POST_GRILL_1.md
      - docs/active/HANDOVER_WORKFLOW_DISCUSSION.md
      - CONTEXT.md
    scope_carry_forward: [5]

  - id: 7
    title: "Slice 7 — Pre-flight validators"
    status: planning
    handover_id: ALFRED_HANDOVER_19
    previous_handover: ALFRED_HANDOVER_18
    scope_sources: []
    scope_carry_forward: [6]
    brief:
      title: "Slice 7 — Pre-flight validators"
      goal: |
        Add five deterministic pre-flight validators to
        scripts/generate_next_canonical_handover.py so malformed
        scope/continuity/ledger conditions hard-fail before any LLM call,
        while preserving the Slice 6 renderer-derived identity flow and the
        existing planner pipeline shape.
      hard_rules:
        - "Slice 7 only: implement pre-flight validation before the planner call; do not start Slice 8+ post-generation validators or failed-candidate filename logic."
        - "No LLM-judge anywhere: pre-flight checks must be deterministic code only, per ADR-0003."
        - "Preserve Slice 6's explicit previous_handover contract; do not infer continuity from phase-id ordering."
        - "Generator must hard-fail before any LLM call when pre-flight validation fails."
        - "Preserve Slice 5's three-role ContextBundle seam and Slice 6's renderer-derived identity / CLI surface."
      tasks:
        - id: "1"
          title: Implement the deterministic pre-flight validator module
          intent: >-
            Create src/alfred/validate/preflight.py (and package init) with
            the fixed five-check minimum: scope-source paths exist;
            carry-forward phase ids exist and are ratified; previous
            handover's next_handover_id matches; no path appears in more than
            one context role; reference tags parse.
        - id: "2"
          title: Wire pre-flight validation into the generator before planning
          intent: >-
            Refactor scripts/generate_next_canonical_handover.py so the new
            pre-flight checks run before any planner / LLM call and surface
            clear blocking errors without changing the external CLI flags.
        - id: "3"
          title: Add isolated negative tests and a real-ledger passing regression
          intent: >-
            Create tests/test_validate/test_preflight.py covering each failed
            check in isolation, plus an integration assertion that the real
            seed ledger passes pre-flight and that next_handover_id mismatch
            blocks planner invocation.
      out_of_scope:
        - Slice 8 post-generation validators.
        - Slice 9 failed-candidate filename short-circuit logic.
        - Generalizing Slice-6-specific authoritative-scope packet wording unless it is required to land pre-flight checks safely.
        - FastAPI endpoint or service-wiring changes.
      definition_of_done:
        - "All 5 deterministic pre-flight checks are implemented with at least one negative test each."
        - "scripts/generate_next_canonical_handover.py hard-fails before any LLM call when pre-flight validation fails."
        - "A passing pre-flight for the real seed ledger is covered by a regression test."
        - "No LLM-judge logic is introduced anywhere in the validation chain."
      followups_from_prior_phase:
        - "Preserve the explicit previous_handover rule introduced in Slice 6; missing continuity metadata must fail loudly rather than falling back to phase-order inference."
        - "Use the new script-boundary dry-run/helper testing pattern when touching generator wiring."
