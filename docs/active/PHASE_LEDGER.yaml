  - id: 9
    title: "Slice 9 — Failed-candidate filename short-circuit"
    status: planning
    handover_id: ALFRED_HANDOVER_21
    previous_handover: ALFRED_HANDOVER_20
    scope_sources:
      - docs/active/POST_GRILL_1.md
      - docs/active/HANDOVER_WORKFLOW_DISCUSSION.md
      - CONTEXT.md
    scope_carry_forward: [8]
    brief:
      title: "Slice 9 — Failed-candidate filename short-circuit"
      goal: |
        Make scripts/validate_alfred_handover.py recognise
        *_FAILED_CANDIDATE.md filenames and skip id/filename checks while
        running every other structural check unchanged, so failed
        candidates remain a debugging surface without producing spurious
        id/filename errors and without weakening Slice 7 pre-flight or
        Slice 8 post-generation gates.
      hard_rules:
        - "Slice 9 only: implement filename short-circuit on the structural validator; do not start Slice 10+ work."
        - "No LLM-judge anywhere: short-circuit logic must be deterministic code only, per ADR-0003."
        - "Preserve Slice 7's pre-flight gate and Slice 8's post-generation gate; the short-circuit applies only to the structural validator on FAILED_CANDIDATE files."
        - "FAILED_CANDIDATE files remain a debugging surface, not protocol artifacts: do not promote them, alter their lifecycle, or extend their metadata contract."
        - "Other structural checks must still run on FAILED_CANDIDATE files; the short-circuit is narrow."
      tasks:
        - id: "1"
          title: Implement the FAILED_CANDIDATE filename short-circuit
          intent: >-
            Edit scripts/validate_alfred_handover.py so paths whose
            filename matches *_FAILED_CANDIDATE.md skip the id/filename
            structural checks while every other structural check runs
            unchanged.
        - id: "2"
          title: Add tests proving the short-circuit and the other-checks-still-run guarantee
          intent: >-
            Edit tests/test_scripts/test_validate_alfred_handover.py with
            a synthetic FAILED_CANDIDATE fixture that has an intentional
            id mismatch plus a separate structural failure (e.g. malformed
            reference tag), proving both halves of the contract — id-skip
            on FAILED_CANDIDATE, other checks still fire.
      out_of_scope:
        - Slice 10+ enhancements.
        - Changing the FAILED_CANDIDATE artifact format produced by scripts/generate_next_canonical_handover.py.
        - Generalising the short-circuit beyond filename pattern matching.
        - Touching Slice 7 pre-flight or Slice 8 post-generation validators.
      definition_of_done:
        - "scripts/validate_alfred_handover.py recognises *_FAILED_CANDIDATE.md and skips id/filename checks on those files."
        - "All other structural checks still run on FAILED_CANDIDATE files, including malformed-reference-tag detection."
        - "At least one negative test proves the short-circuit; at least one test proves the other-checks-still-run guarantee."
        - "No LLM-judge logic is introduced anywhere in the validation chain."
      followups_from_prior_phase:
        - "Carry forward Slice 8's pattern of script-boundary tests proving end-to-end behaviour, not only unit-level."
        - "Preserve the seam discipline established in Slice 8: validators stay pure matchers; semantic policy lives in callers."
