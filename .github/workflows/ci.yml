name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — Lint
  # ruff (style/import order) + pyright (type checking)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      # 30 pre-existing type errors in src/alfred/ pre-date Phase 6.
      # Advisory until those are resolved; remove continue-on-error once clean.
      - name: pyright
        run: pyright
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Stage 2 — Unit tests
  # Existing test suite; excludes tests/property/ (handled in stage 3).
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/property --junit-xml=junit-unit.xml -q

      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-unit
          path: junit-unit.xml

  # ---------------------------------------------------------------------------
  # Stage 3 — Property tests
  # Hypothesis suite; database cached across runs keyed on pyproject.toml.
  # ---------------------------------------------------------------------------
  property-tests:
    name: Property tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Restore Hypothesis database
        uses: actions/cache@v4
        with:
          path: .hypothesis/
          key: hypothesis-${{ hashFiles('pyproject.toml') }}
          restore-keys: hypothesis-

      - name: Run property tests
        run: pytest tests/property/ -v

  # ---------------------------------------------------------------------------
  # Stage 4 — Eval harness
  # Deterministic fixture scoring; no API keys required.
  # ---------------------------------------------------------------------------
  evals:
    name: Eval harness
    runs-on: ubuntu-latest
    needs: [property-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run eval harness
        run: python evals/run_evals.py
        env:
          EVAL_PASS_THRESHOLD: "0.8"

  # ---------------------------------------------------------------------------
  # Stage 5 — Coverage gate
  # Global gate via pytest --cov-fail-under; per-module gate via check_coverage.py.
  # ---------------------------------------------------------------------------
  coverage-gate:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: [evals]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Measure coverage
        run: pytest --cov=alfred --cov-report=json --cov-fail-under=80 -q --tb=short

      - name: Per-module coverage gate
        run: python scripts/check_coverage.py
