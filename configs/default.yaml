# Alfred default configuration
# All secrets (API keys, tokens) are referenced by environment variable name only.
# Never store credentials in this file.

llm:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  temperature: 0.0        # Deterministic by default (methodology property 2)
  max_tokens: 4096

cost_routing:
  enabled: true
  provider: "anthropic"
  classifier_model: "claude-haiku-4-5-20251001"  # cheap: triage and classification
  generator_model: "claude-sonnet-4-6"            # expensive: planner, critique, compile

github:
  org: ""                 # Your GitHub org or user
  project_number: 0       # GitHub Projects V2 project number
  token_env_var: "GITHUB_TOKEN"

rag:
  corpus_path: "docs"
  chunk_size: 1000
  chunk_overlap: 200
  embedding_model: "all-MiniLM-L6-v2"
  index_path: "data/rag_index"

database:
  path: "data/alfred.db"

hitl:
  timeout_seconds: 3600

handover:
  schema_version: "1.0"
  template_path: "configs/handover_template.md"
  corpus_glob: "**/*_HANDOVER_*.md"

agents:
  planner:
    enabled: true
    max_critique_iterations: 2
    critique_quality_threshold: 0.8
  story_generator:
    enabled: true
  quality_judge:
    enabled: true
  retro_analyst:
    enabled: true
